version: "3.9"

services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlflow-server
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db 
      --artifacts-destination file:///mlflow/mlartifacts 
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
      --cors-allowed-origins "*"
    ports:
      - "5002:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-api
    command: >
      uvicorn api.app:app
      --host 0.0.0.0
      --port 8000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data: