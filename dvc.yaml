stages:
  stage_01_data_ingestion:
    cmd: python src/mlPipeline/pipeline/stage_01_data_ingestion.py
    deps:
    - configs/config.yaml
    - params.yaml
    - src/mlPipeline/pipeline/stage_01_data_ingestion.py
    - src/mlPipeline/components/data_ingestion.py
    - src/mlPipeline/config/configuration.py
    outs:
    - data/raw/creditcard.csv

  stage_02_data_validation:
    cmd: python src/mlPipeline/pipeline/stage_02_data_validation.py
    deps:
      - src/mlPipeline/pipeline/stage_02_data_validation.py
      - src/mlPipeline/components/data_validation.py
      - src/mlPipeline/config/configuration.py
      - configs/config.yaml
      - params.yaml
      - data/raw/creditcard.csv
      - configs/schema.yaml
    outs:
      - reports/validation/status.txt
      - reports/validation/report.json

  stage_03_data_transformation:
    cmd: python src/mlPipeline/pipeline/stage_03_data_transformation.py
    deps:
      - src/mlPipeline/pipeline/stage_03_data_transformation.py
      - src/mlPipeline/components/data_transformation.py
      - src/mlPipeline/config/configuration.py
      - configs/config.yaml
      - params.yaml
      - data/raw/creditcard.csv
    outs:
      - reports/data_transformation/preprocessor_stats.json
      - artifacts/data_transformation/preprocessor.joblib
      - artifacts/data_transformation/preprocessed/train.parquet
      - artifacts/data_transformation/preprocessed/test.parquet
      - artifacts/data_transformation/preprocessed/val.parquet

  stage_04_model_training:
    cmd: python src/mlPipeline/pipeline/stage_04_model_training.py
    deps:
      - src/mlPipeline/pipeline/stage_04_model_training.py
      - src/mlPipeline/components/model_trainer.py
      - src/mlPipeline/utils/model_registry.py
      - configs/config.yaml
      - params.yaml
      - artifacts/data_transformation/preprocessed/train.parquet
      - artifacts/data_transformation/preprocessed/val.parquet
    outs:
      - artifacts/model_training/models
      - artifacts/model_training/best_model.joblib
      - artifacts/model_training/mlflow_model_info.json
    metrics:
      - artifacts/model_training/train_metrics.json
      

  stage_05_model_evaluation:
    cmd: python src/mlPipeline/pipeline/stage_05_model_evaluation.py
    deps:
      - src/mlPipeline/pipeline/stage_05_model_evaluation.py
      - src/mlPipeline/components/model_evaluation.py
      - configs/config.yaml
      - params.yaml
      - artifacts/data_transformation/preprocessed/test.parquet
      - artifacts/model_training/best_model.joblib
      - artifacts/model_training/train_metrics.json
      - artifacts/model_training/mlflow_model_info.json
    outs:
      - artifacts/model_evaluation/classification_report.txt
      - artifacts/model_evaluation/confusion_matrix.png
    metrics:
      - artifacts/model_evaluation/evaluation_metrics.json  